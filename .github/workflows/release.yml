name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
          - os: darwin
            arch: x64
          - os: linux
            arch: arm64
          - os: linux
            arch: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun scripts/build-binary.ts --target=${{ matrix.os }}-${{ matrix.arch }}

      - name: Create tarball
        run: tar -czf whap-${{ matrix.os }}-${{ matrix.arch }}.tar.gz -C dist whap-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whap-${{ matrix.os }}-${{ matrix.arch }}
          path: whap-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  release-and-brew:
    name: Create Release and Update Homebrew Formula
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: whap-*
          merge-multiple: true

      - name: List downloaded assets
        run: ls -la

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: whap-*.tar.gz

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate SHA256 checksums
        id: checksums
        run: |
          echo "darwin-arm64=$(sha256sum whap-darwin-arm64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "darwin-x64=$(sha256sum whap-darwin-x64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux-arm64=$(sha256sum whap-linux-arm64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux-x64=$(sha256sum whap-linux-x64.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: fdarian/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew formula in tap
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_DARWIN_ARM64="${{ steps.checksums.outputs.darwin-arm64 }}"
          SHA_DARWIN_X64="${{ steps.checksums.outputs.darwin-x64 }}"
          SHA_LINUX_ARM64="${{ steps.checksums.outputs.linux-arm64 }}"
          SHA_LINUX_X64="${{ steps.checksums.outputs.linux-x64 }}"

          mkdir -p homebrew-tap/Formula

          cat > homebrew-tap/Formula/whap.rb << RUBY
          class Whap < Formula
            desc "CLI and mock server for testing WhatsApp integration"
            homepage "https://github.com/fdarian/whap"
            version "$VERSION"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/fdarian/whap/releases/download/v$VERSION/whap-darwin-arm64.tar.gz"
                sha256 "$SHA_DARWIN_ARM64"

                def install
                  bin.install "whap-darwin-arm64" => "whap"
                end
              end
              on_intel do
                url "https://github.com/fdarian/whap/releases/download/v$VERSION/whap-darwin-x64.tar.gz"
                sha256 "$SHA_DARWIN_X64"

                def install
                  bin.install "whap-darwin-x64" => "whap"
                end
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/fdarian/whap/releases/download/v$VERSION/whap-linux-arm64.tar.gz"
                sha256 "$SHA_LINUX_ARM64"

                def install
                  bin.install "whap-linux-arm64" => "whap"
                end
              end
              on_intel do
                url "https://github.com/fdarian/whap/releases/download/v$VERSION/whap-linux-x64.tar.gz"
                sha256 "$SHA_LINUX_X64"

                def install
                  bin.install "whap-linux-x64" => "whap"
                end
              end
            end

            test do
              system "#{bin}/whap", "--version"
            end
          end
          RUBY

      - name: Commit and push formula update to tap
        run: |
          cd homebrew-tap
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Formula/whap.rb
          git commit -m "chore: update whap formula to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push
